<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop & Array</title>
</head>
<body>
    <h1>Loop & Array</h1>
    <h2>Co workers</h2>
        <script>
        var coworkers =["jun", "aya", "ju", "chu", "ar"];
        </script>
    <ul>
        <script>
            var i = 0;
            while (i<coworkers.length) {
                document.write('<li><a href="http/a.com/'+coworkers[i]+'">'+coworkers[i]+'</li>');
                i = i + 1;
            }
        </script>
    </ul>


    
</body>
</html>
