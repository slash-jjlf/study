<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <h1>Array</h1>
    <h2>Syntax</h2>
    <script>
        var cowokers =["jun","yuki","dimas","fajar"];
    </script>

    <h2>Get</h2>
    <script>
        document.write(cowokers[0]);
        document.write(cowokers[2]);
    </script>

    <h2>Add</h2>
    <script>
        cowokers.push("Aya");
        cowokers.push("Ju");
    </script>
    
    <h2>Get_all</h2>
    <script>
        document.write(cowokers);
    </script>

    <h2>Count</h2>
    <script>
        document.write(cowokers.length);
    </script>

</body>
</html>
