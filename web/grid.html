<head>

    <title>Document</title>

        #grid {
            border: 5px solid pink;
            display: grid;
            grid-template-columns: 150px 1fr;
        }
        div {
            border: 5px solid gray;

</head>

    <div id="grid">
        <div>NAVIGATION</div> 
        <div> Web browsers receive HTML documents from a web server or from local

        its appearance.</div>
    </div>
        
</body>
</html>
